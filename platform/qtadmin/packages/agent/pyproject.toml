[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quanttide-agent"
version = "0.1.0"
description = "AIGC 基础设施 - LLM 调用、嵌入向量、相似度算法、聚类"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.0.0",
    "numpy>=1.20.0",
    "scikit-learn>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
