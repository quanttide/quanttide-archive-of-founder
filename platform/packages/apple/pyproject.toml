[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quanttide-apple"
version = "0.1.0"
description = "Apple ecosystem Python SDK - Shortcuts-based integration for Notes, Contacts, Calendar, Reminders"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
